<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JMP Medical Centre - Stock System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #eef2f7;
}

.header {
    background: linear-gradient(135deg,#0056b3,#007bff);
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 10px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.primary { background: #007bff; color: white; }
.success { background: #28a745; color: white; }
.warning { background: #ffc107; color: black; }

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #007bff;
    color: white;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}
</style>
</head>

<body>

<div class="header">
    <h2>JMP Medical Centre, Piravom</h2>
    <p>Stock Register System</p>
</div>

<div class="container">

<!-- ENTRY -->
<div class="card">
<h3>Add Stock</h3>

<div class="form-grid">
<input id="itemName" placeholder="Item Name">
<input id="department" placeholder="Department">
<select id="category">
<option>Consumable</option>
<option>Electronics</option>
<option>Utility</option>
<option>Furniture</option>
</select>

<select id="type">
<option>Moving</option>
<option>Non-Moving</option>
</select>

<input id="serial" placeholder="Serial Number">
<input id="warranty" placeholder="Warranty">
<input id="quantity" type="number" placeholder="Quantity">
<input id="date" type="date">
</div>

<br>
<button class="btn primary" onclick="addStock()">Add Item</button>
</div>

<!-- REPORT -->
<div class="card">
<h3>Stock Report</h3>

<select id="filterDept">
<option value="All">All Departments</option>
</select>

<button class="btn success" onclick="loadReport()">Generate</button>
<button class="btn warning" onclick="generatePDF()">Download PDF</button>

<table id="table"></table>

</div>

</div>

<script>

let stock = JSON.parse(localStorage.getItem("stockData")) || [];

function saveData(){
    localStorage.setItem("stockData", JSON.stringify(stock));
}

// ADD
function addStock(){

    let item = {
        id: Date.now(),
        name: itemName.value,
        dept: department.value,
        category: category.value,
        type: type.value,
        serial: serial.value,
        warranty: warranty.value,
        qty: quantity.value,
        date: date.value
    };

    if(!item.name || !item.dept || !item.qty){
        alert("Fill required fields");
        return;
    }

    stock.push(item);
    saveData();

    document.querySelectorAll("input").forEach(i=>i.value="");

    updateDepartments();
    loadReport();
}

// REPORT TABLE
function loadReport(){

    let filter = filterDept.value;
    let table = document.getElementById("table");

    table.innerHTML = `
    <tr>
    <th>Item</th><th>Dept</th><th>Category</th>
    <th>Type</th><th>Serial</th><th>Warranty</th>
    <th>Qty</th><th>Date</th><th>Action</th>
    </tr>`;

    let filtered = stock.filter(s => filter==="All" || s.dept===filter);

    if(filtered.length===0){
        table.innerHTML += `<tr><td colspan="9">No Data</td></tr>`;
        return;
    }

    filtered.forEach(s=>{
        let row = table.insertRow();
        row.innerHTML = `
        <td>${s.name}</td>
        <td>${s.dept}</td>
        <td>${s.category}</td>
        <td>${s.type}</td>
        <td>${s.serial||"-"}</td>
        <td>${s.warranty||"-"}</td>
        <td>${s.qty}</td>
        <td>${s.date||"-"}</td>
        <td><button onclick="deleteItem(${s.id})">❌</button></td>
        `;
    });
}

// DELETE PASSWORD
function deleteItem(id){

    let pass = prompt("Enter password:");

    if(pass !== "6napcdb88"){
        alert("Wrong password");
        return;
    }

    stock = stock.filter(s=>s.id!==id);
    saveData();
    loadReport();
}

// DEPARTMENTS
function updateDepartments(){

    let select = document.getElementById("filterDept");
    let depts = [...new Set(stock.map(s=>s.dept))];

    select.innerHTML = `<option value="All">All Departments</option>`;

    depts.forEach(d=>{
        let opt=document.createElement("option");
        opt.value=d;
        opt.text=d;
        select.appendChild(opt);
    });
}

// PDF TABLE (FULL PAGE)
async function generatePDF(){

    if(stock.length===0){
        alert("No data");
        return;
    }

    const { jsPDF } = window.jspdf;

    // LANDSCAPE
    const doc = new jsPDF("l", "mm", "a4");

    let img = new Image();
    img.src = "images/letterhead.jpg";

    img.onload = function(){

        let y = 40;

        function drawHeader(){
            doc.addImage(img, "JPEG", 10, 5, 277, 30);

            doc.setFontSize(14);
            doc.text("Stock Report - JMP Medical Centre", 10, 40);
        }

        drawHeader();

        y = 50;

        const headers = ["Item","Dept","Category","Type","Serial","Warranty","Qty","Date"];
        const colWidths = [50,40,40,40,40,40,20,30];

        function drawRow(row,yPos){
            let x=10;
            row.forEach((cell,i)=>{
                doc.rect(x,yPos,colWidths[i],8);
                doc.text(String(cell), x+2, yPos+5);
                x+=colWidths[i];
            });
        }

        doc.setFont(undefined,"bold");
        drawRow(headers,y);
        doc.setFont(undefined,"normal");

        y+=8;

        stock.forEach((s)=>{

            let row=[
                s.name,
                s.dept,
                s.category,
                s.type,
                s.serial||"-",
                s.warranty||"-",
                s.qty,
                s.date||"-"
            ];

            if(y>180){
                doc.addPage();
                drawHeader();
                y=50;

                doc.setFont(undefined,"bold");
                drawRow(headers,y);
                doc.setFont(undefined,"normal");

                y+=8;
            }

            drawRow(row,y);
            y+=8;
        });

        doc.save("JMP_Stock_Report.pdf");
    }
}

// INIT
updateDepartments();
loadReport();

</script>

</body>
</html>
