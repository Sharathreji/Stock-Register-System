<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JMP Medical Centre - Stock Register-System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #eef2f7;
}

/* HEADER */
.header {
    background: #1f4e79;
    color: white;
    padding: 12px;
}

.header-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.logo {
    height: 55px;
}

/* LAYOUT */
.container { padding: 15px; }

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* FORM */
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap: 10px;
}

input, select {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.primary { background: #007bff; color: white; }
.success { background: #28a745; color: white; }
.warning { background: #ffc107; color: black; }

/* TABLE */
.table-wrapper {
    overflow-y: auto;
    max-height: 400px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1f4e79;
    color: white;
    position: sticky;
    top: 0;
}

th, td {
    padding: 6px;
    border: 1px solid #ddd;
    text-align: center;
}

</style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <img src="images/logo.png" class="logo">
        <div>
            <h2>JMP Medical Centre</h2>
            <p>Stock Register</p>
        </div>
    </div>
</div>

<div class="container">

<div class="card">
<h3>Add Stock</h3>

<div class="form-grid">
<input id="itemName" placeholder="Item Name">
<input id="department" placeholder="Department">
<select id="category">
<option>Consumable</option>
<option>Electronics</option>
<option>Utility</option>
</select>

<select id="type">
<option>Moving</option>
<option>Non-Moving</option>
</select>

<input id="serial" placeholder="Serial">
<input id="warranty" placeholder="Warranty">
<input id="quantity" type="number" placeholder="Qty">
<input id="date" type="date">
</div>

<br>
<button class="primary" onclick="addStock()">Add</button>
</div>

<div class="card">
<h3>Report</h3>

<select id="filterDept"></select>
<button class="success" onclick="loadReport()">Generate</button>
<button class="warning" onclick="generatePDF()">PDF</button>

<div class="table-wrapper">
<table id="table"></table>
</div>

</div>

</div>

<script>

let stock = JSON.parse(localStorage.getItem("stockData")) || [];

function saveData(){
    localStorage.setItem("stockData", JSON.stringify(stock));
}

// ADD
function addStock(){

    let item = {
        id: Date.now(),
        name: itemName.value,
        dept: department.value,
        category: category.value,
        type: type.value,
        serial: serial.value,
        warranty: warranty.value,
        qty: quantity.value,
        date: date.value
    };

    if(!item.name || !item.dept || !item.qty){
        alert("Fill required fields");
        return;
    }

    stock.push(item);
    saveData();

    document.querySelectorAll("input").forEach(i=>i.value="");

    updateDepartments();
    loadReport();
}

// DEPT
function updateDepartments(){
    let select = document.getElementById("filterDept");
    let depts = [...new Set(stock.map(s=>s.dept))];

    select.innerHTML = `<option value="All">All</option>`;
    depts.forEach(d=>{
        let opt=document.createElement("option");
        opt.value=d;
        opt.text=d;
        select.appendChild(opt);
    });
}

// FAST RENDER
function loadReport(){

    let table = document.getElementById("table");
    let filter = filterDept.value;

    table.innerHTML = `
    <tr>
    <th>Item</th><th>Dept</th><th>Category</th>
    <th>Type</th><th>Serial</th><th>Warranty</th>
    <th>Qty</th><th>Date</th><th>Del</th>
    </tr>`;

    let filtered = stock.filter(s => filter==="All" || s.dept===filter);

    let chunk = 200;
    let i = 0;

    function renderChunk(){

        let fragment = document.createDocumentFragment();

        for(let j=0;j<chunk && i<filtered.length;j++,i++){

            let s = filtered[i];

            let row = document.createElement("tr");

            row.innerHTML = `
            <td>${s.name}</td>
            <td>${s.dept}</td>
            <td>${s.category}</td>
            <td>${s.type}</td>
            <td>${s.serial||"-"}</td>
            <td>${s.warranty||"-"}</td>
            <td>${s.qty}</td>
            <td>${s.date||"-"}</td>
            <td><button onclick="deleteItem(${s.id})">❌</button></td>
            `;

            fragment.appendChild(row);
        }

        table.appendChild(fragment);

        if(i < filtered.length){
            requestAnimationFrame(renderChunk);
        }
    }

    renderChunk();
}

// DELETE
function deleteItem(id){
    let pass = prompt("Password:");
    if(pass !== "6napcdb88"){
        alert("Wrong");
        return;
    }
    stock = stock.filter(s=>s.id!==id);
    saveData();
    loadReport();
}

// PDF PORTRAIT
async function generatePDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");

    let filter = filterDept.value;
    let data = stock.filter(s => filter==="All" || s.dept===filter);

    if(data.length===0){
        alert("No data");
        return;
    }

    let img = new Image();
    img.src = "images/letterhead.jpg";

    img.onload = function(){

        let y = 45;

        function header(){
            doc.addImage(img,"JPEG",10,5,190,30);
            doc.setFontSize(11);
            doc.text("Stock Report",10,40);
        }

        header();

        const headers = ["Item","Dept","Cat","Type","Qty"];
        const colWidths = [60,35,25,25,15];

        function drawRow(row,yPos){

            let x=10;
            let maxH=0;

            let lines=row.map((c,i)=>{
                let l=doc.splitTextToSize(String(c),colWidths[i]-2);
                maxH=Math.max(maxH,l.length*4);
                return l;
            });

            lines.forEach((cell,i)=>{
                doc.rect(x,yPos,colWidths[i],maxH+3);
                cell.forEach((line,j)=>{
                    doc.text(line,x+2,yPos+3+j*4);
                });
                x+=colWidths[i];
            });

            return maxH+3;
        }

        doc.setFont(undefined,"bold");
        let h=drawRow(headers,y);
        doc.setFont(undefined,"normal");
        y+=h;

        data.forEach(s=>{

            let row=[s.name,s.dept,s.category,s.type,s.qty];

            let h=drawRow(row,y);

            if(y+h>270){
                doc.addPage();
                header();
                y=45;
                drawRow(headers,y);
                y+=10;
            }

            y+=h;
        });

        doc.save("Stock_Report.pdf");
    }
}

// INIT
updateDepartments();
loadReport();

</script>

</body>
</html>
